<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us – Opulent Influencers House</title>
    <link rel="icon" type="image/png" href="assets/images/fav.png" />
    <style>
        :root {
            --bg: #f4f6ff;
            --surface: #ffffff;
            --ink: #0a0f1e;
            --muted: #5e667b;
            --primary: #6161ff;
            --secondary: #ff0360;
            --line: rgba(10, 15, 30, 0.08);
            --shadow-soft: 0 12px 30px rgba(10, 15, 30, 0.06);
            --ease: 0.3s ease;
            --container: min(1140px, calc(100% - 42px));
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Inter, "Segoe UI", system-ui, sans-serif;
            background: radial-gradient(circle at 88% 6%, rgba(97, 97, 255, 0.12), transparent 28%), var(--bg);
            color: var(--ink);
        }
        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; display: block; border-radius: inherit; }
        .container { width: var(--container); margin: 0 auto; }
        .nav-wrap { padding: 18px 0 8px; }
        .navbar {
            background: rgba(255, 255, 255, 0.76);
            border-radius: 999px;
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(10px);
            padding: 12px 18px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 20px;
            align-items: center;
        }
        .logo {
            font-weight: 700;
            letter-spacing: -0.02em;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon { width: auto; height: 36px; object-fit: contain; flex-shrink: 0; }
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            font-size: 14px;
            color: #3b342d;
        }
        .nav-links a {
            position: relative;
            font-weight: 500;
            color: #3b342d;
            transition: color var(--ease);
            padding: 4px 0;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }
        .nav-links a::after {
            content: "";
            position: absolute;
            left: 0; bottom: -2px;
            width: 0; height: 2px;
            background: var(--primary);
            transition: width var(--ease);
            border-radius: 2px;
        }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
        .nav-actions { display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .btn {
            border: 0;
            border-radius: 999px;
            padding: 12px 20px;
            font-weight: 600;
            cursor: pointer;
            transition: transform var(--ease), box-shadow var(--ease), background var(--ease);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
        }
        .btn:hover { transform: translateY(-2px) scale(1.01); }
        .btn-gold {
            color: #ffffff;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 10px 24px rgba(97, 97, 255, 0.3);
        }
        @media (max-width: 760px) {
            .navbar { grid-template-columns: 1fr; border-radius: 20px; gap: 10px; }
            .nav-links, .nav-actions { justify-content: flex-start; flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="nav-wrap">
        <div class="container">
            <nav class="navbar">
                <a class="logo" href="index.html">
                    <img class="logo-icon" src="assets/images/favicon.png" alt="Opulent icon" />
                </a>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="about.html" class="active">About Us</a>
                    <a href="for-brands.html">For Brands</a>
                    <a href="for-influencers.html">For Influencers</a>
                    <a href="service.html">Services</a>
                    <a href="blog.html">Blogs</a>
                    <a href="contact.html">Contact</a>
                </div>
                <div class="nav-actions">
                    <a href="signup.html" class="btn btn-gold">Sign Up</a>
                </div>
            </nav>
        </div>
    </div>

</body>
</html>
